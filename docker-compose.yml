version: '3.8'

services:
  # 1. Frontend (Next.js)
  frontend:
    build: 
      context: ./frontend
    container_name: alzheimer-frontend
    restart: unless-stopped
    # ผูก Volume เพื่อให้แก้โค้ดที่เครื่องเรา แล้วเว็บอัปเดตทันทีโดยไม่ต้อง Build ใหม่
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network

  # 2. Backend API Gateway (Node.js)
  backend-core:
    build: 
      context: ./services/backend-core
    container_name: alzheimer-backend
    restart: unless-stopped
    depends_on:
      - ai-service
    volumes:
      - ./services/backend-core:/app
      - /app/node_modules
    environment:
      - PORT=3000
      - AI_SERVICE_URL=http://ai-service:8080/predict
      - PATIENT_SERVICE_URL=http://patient-service:3001
      - MONGODB_URI=${MONGODB_URI}
    networks:
      - app-network

  # 3. AI Service (Python/FastAPI)
  ai-service:
    build: 
      context: ./services/ai-service
    container_name: alzheimer-ai
    restart: unless-stopped
    volumes:
      - ./services/ai-service:/app
    networks:
      - app-network

  # 4. Patient Service (Node.js) - New Microservice
  patient-service:
    build:
      context: ./services/patient-service
    container_name: alzheimer-patient-service
    restart: unless-stopped
    environment:
      - PORT=3001
      - MONGODB_URI=${MONGODB_URI}
    depends_on:
      - mongodb
    volumes:
      - ./services/patient-service:/app
      - /app/node_modules
      - patient_uploads:/app/uploads
    networks:
      - app-network

  # 5. MongoDB
  mongodb:
    image: mongo:latest
    container_name: alzheimer-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  # 6. Mongo Express (Database GUI)
  mongo-express:
    image: mongo-express:latest
    container_name: alzheimer-mongo-gui
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
    depends_on:
      - mongodb
    networks:
      - app-network

  # 7. Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: alzheimer-nginx
    restart: always
    ports:
      - "80:80"  # เปิด Port 80 ให้เครื่องเราเข้าถึงได้
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend-core
      - patient-service
    networks:
      - app-network

# สร้าง Network ให้แต่ละ Service คุยกันผ่านชื่อ Service ได้เลย (เช่น http://backend-core)
networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
  patient_uploads: